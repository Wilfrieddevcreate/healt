<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g transform="translate(256,256)" stroke="white" stroke-width="28" stroke-linecap="round" fill="none">
    <!-- Bar -->
    <line x1="-120" y1="0" x2="120" y2="0"/>
    <!-- Left weight plates -->
    <rect x="-155" y="-65" width="40" height="130" rx="10" fill="white" stroke="none"/>
    <rect x="-180" y="-50" width="30" height="100" rx="8" fill="white" stroke="none"/>
    <!-- Right weight plates -->
    <rect x="115" y="-65" width="40" height="130" rx="10" fill="white" stroke="none"/>
    <rect x="150" y="-50" width="30" height="100" rx="8" fill="white" stroke="none"/>
  </g>
</svg>
